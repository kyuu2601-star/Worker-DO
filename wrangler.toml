name = "sync-sheet-worker"
main = "index.js"
compatibility_date = "2026-06-28"

# ==========================================
# 🌐 1. CỔNG CẮM ĐẠI NÃO PHÒNG CHƠI RAM (DURABLE OBJECT)
# ==========================================
[[durable_objects.bindings]]
name = "FARM_ROOM_DO"
class_name = "FarmRoomDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FarmRoomDurableObject"]

# ==========================================
# 🗄️ 2. CỔNG CẮM DATABASE D1 (ĐÃ KHÔI PHỤC)
# ==========================================
[[d1_databases]]
binding = "D1"                             # Giữ nguyên chữ D1 in hoa chính xác theo code của bạn
database_name = "mon_garden_db"            # Tên database hiển thị ngoài menu của bạn
database_id = "e1d5e89d-c70f-40de-b290-111ceba3e5ff"
